name: Draft new release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example 3.1.0.0
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish release packages
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ github.workspace }}/release"

        for rid in win-x86 win-x64 linux-arm linux-arm64 linux-x64 osx-x64 osx-arm64; do
          dotnet publish ConsoleAppCore/ConsoleAppCore.csproj \
            --configuration Release \
            --runtime "$rid" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "${{ github.workspace }}/publish/$rid"

          zip -r -D -j "${{ github.workspace }}/release/$rid.zip" "${{ github.workspace }}/publish/$rid/"
        done

    - name: Create draft release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: Version ${{ inputs.tag }}
        draft: true
        prerelease: false
        files: ${{ github.workspace }}/release/*.zip
        body: |
          Draft release for ${{ inputs.tag }}.

          Included packages:
          - win-x86.zip
          - win-x64.zip
          - linux-arm.zip
          - linux-arm64.zip
          - linux-x64.zip
          - osx-x64.zip
          - osx-arm64.zip
